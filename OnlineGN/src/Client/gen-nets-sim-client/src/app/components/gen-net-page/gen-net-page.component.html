<div class="page-container">
  <!-- Header / Toolbar Section -->
  <header class="app-header card">
    <div class="header-content">
      <h1 class="app-title">GenNets Simulator</h1>
      <header-buttons
        [genNetRaw]="genNetRaw"
        [codeCompilerService]="codeCompilerService"
        [settings]="settings"
        (genNetImported)="initialize($event)"
        (makeStep)="makeStep()"
        (fullSimulation)="fullSimulation()"
        (resetSimulation)="resetSimulation()"
        (editPositions)="editPositions()"
      ></header-buttons>
    </div>
  </header>

  <!-- Main Content Flex Layout -->
  <main class="main-content" (mousemove)="onMouseMove($event)" (mouseup)="onMouseUp()">
    <!-- Left Column: Simulation View -->
    <section class="simulation-section card" [style.width.px]="leftPanelWidth">
      <div class="section-header">
        <h2>Simulation View</h2>
        <span class="step-badge">Step: {{ currentStep }}</span>
      </div>
      
      <div class="simulation-container">
        <div id="d3-container" class="d3-canvas"></div>
        
        <div class="position-changer-overlay" *ngIf="showPositionChanger">
          <position-changer [graphEngine]="graphEngine"></position-changer>
        </div>
      </div>
    </section>

    <!-- Splitter -->
    <div class="splitter" (mousedown)="onMouseDown()"></div>

    <!-- Right Column: Controls & Functions -->
    <aside class="controls-section" [style.flex]="'1'">
      <div class="card functions-card">
        <h2>Global Functions</h2>
        <global-functions-form
          [codeCompilerService]="codeCompilerService!"
        ></global-functions-form>
      </div>
    </aside>
  </main>

  <!-- Floating Tooltip -->
  <tooltip-predicate-matrix-view
    *ngIf="graphEngine && genNetGraphData"
    [graphEngine]="graphEngine"
    [genNetGraphData]="genNetGraphData"
  ></tooltip-predicate-matrix-view>
</div>
