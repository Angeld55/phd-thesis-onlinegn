<mat-dialog-content>
  <span *ngIf="isLoading$ | async">Saving...</span>

  <span *ngIf="!genNetId && !(isLoading$ | async)">Failed to save</span>
  <div>Url:</div>
  <div>
    <mat-form-field class="full-width" *ngIf="genNetId">
      <mat-label>Generated URL</mat-label>
      <textarea
        readonly="true"
        matInput
        cdkTextareaAutosize
        #autosize="cdkTextareaAutosize"
        cdkAutosizeMinRows="3"
        cdkAutosizeMaxRows="10"
        [ngModel]="genNetUrl"
      ></textarea>
    </mat-form-field>
  </div>
  <div>
    <button
      *ngIf="genNetId"
      mat-button
      mat-flat-button
      color="primary"
      (click)="copyToClipboard()"
    >
      Copy to clipboard
    </button>
  </div>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button mat-flat-button color="primary" mat-dialog-close>
    Close
  </button>
</mat-dialog-actions>
